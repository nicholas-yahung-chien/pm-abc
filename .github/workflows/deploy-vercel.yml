name: Deploy Vercel

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  preview:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Check Vercel token
        id: precheck
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Vercel CLI
        if: steps.precheck.outputs.has_token == 'true'
        run: npm i -g vercel@latest

      - name: Pull Vercel project settings (preview)
        if: steps.precheck.outputs.has_token == 'true'
        run: vercel pull --yes --environment=preview --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build preview artifacts
        if: steps.precheck.outputs.has_token == 'true'
        run: vercel build --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy preview
        if: steps.precheck.outputs.has_token == 'true'
        id: deploy_preview
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_JSON=$(vercel deploy --prebuilt --yes --token="${{ secrets.VERCEL_TOKEN }}" --format json --no-color)
          echo "$DEPLOY_JSON"
          DEPLOY_URL=$(echo "$DEPLOY_JSON" | node -e "const fs=require('fs'); const j=JSON.parse(fs.readFileSync(0, 'utf8')); let u=j.url||''; if (u && !u.startsWith('http')) u='https://'+u; process.stdout.write(u);")
          if [ -z "$DEPLOY_URL" ]; then
            echo "Failed to resolve preview deployment URL."
            exit 1
          fi
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

      - name: Health check preview homepage
        if: steps.precheck.outputs.has_token == 'true'
        shell: bash
        env:
          HEALTH_URL: ${{ steps.deploy_preview.outputs.url }}
        run: |
          set -euo pipefail
          echo "Checking preview URL: $HEALTH_URL"
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL")
            if [ "$STATUS" = "200" ]; then
              echo "Preview health check passed."
              exit 0
            fi
            if [ "$STATUS" = "401" ]; then
              echo "Preview is access-protected (401). Treating as healthy."
              exit 0
            fi
            echo "Attempt $i/12: status=$STATUS, retry in 10s..."
            sleep 10
          done
          echo "Preview health check failed: $HEALTH_URL"
          exit 1

      - name: Skip note (missing token)
        if: steps.precheck.outputs.has_token != 'true'
        run: echo "VERCEL_TOKEN is not set. Skipping preview deploy."

  production:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Check Vercel token
        id: precheck
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Vercel CLI
        if: steps.precheck.outputs.has_token == 'true'
        run: npm i -g vercel@latest

      - name: Pull Vercel project settings (production)
        if: steps.precheck.outputs.has_token == 'true'
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build production artifacts
        if: steps.precheck.outputs.has_token == 'true'
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy production
        if: steps.precheck.outputs.has_token == 'true'
        id: deploy_production
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_JSON=$(vercel deploy --prebuilt --prod --yes --token="${{ secrets.VERCEL_TOKEN }}" --format json --no-color)
          echo "$DEPLOY_JSON"
          DEPLOY_URL=$(echo "$DEPLOY_JSON" | node -e "const fs=require('fs'); const j=JSON.parse(fs.readFileSync(0, 'utf8')); let u=j.url||''; if (u && !u.startsWith('http')) u='https://'+u; process.stdout.write(u);")
          if [ -z "$DEPLOY_URL" ]; then
            echo "Failed to resolve production deployment URL."
            exit 1
          fi
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

      - name: Health check production homepage
        if: steps.precheck.outputs.has_token == 'true'
        shell: bash
        env:
          PRODUCTION_SITE_URL: https://pm-abc-learning-portal.vercel.app
        run: |
          set -euo pipefail
          echo "Checking production URL: $PRODUCTION_SITE_URL"
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$PRODUCTION_SITE_URL")
            if [ "$STATUS" = "200" ]; then
              echo "Production health check passed."
              exit 0
            fi
            echo "Attempt $i/12: status=$STATUS, retry in 10s..."
            sleep 10
          done
          echo "Production health check failed: $PRODUCTION_SITE_URL"
          exit 1

      - name: Skip note (missing token)
        if: steps.precheck.outputs.has_token != 'true'
        run: echo "VERCEL_TOKEN is not set. Skipping production deploy."
