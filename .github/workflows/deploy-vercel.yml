name: Deploy Vercel

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

env:
  HAS_VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN != '' }}

jobs:
  preview:
    if: ${{ github.event_name == 'pull_request' && env.HAS_VERCEL_TOKEN == 'true' }}
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel project settings (preview)
        working-directory: web
        run: vercel pull --yes --environment=preview --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build preview artifacts
        working-directory: web
        run: vercel build --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy preview
        working-directory: web
        run: vercel deploy --prebuilt --token="${{ secrets.VERCEL_TOKEN }}"

  production:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && env.HAS_VERCEL_TOKEN == 'true' }}
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel project settings (production)
        working-directory: web
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build production artifacts
        working-directory: web
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy production
        working-directory: web
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"

  missing-token-note:
    if: ${{ env.HAS_VERCEL_TOKEN != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Explain skipped deploy
        run: echo "VERCEL_TOKEN is not set. Vercel deployment job is skipped until the secret is configured."
