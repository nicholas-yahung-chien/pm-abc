name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check text encoding safety
        run: npm run check:encoding

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
