name: Deploy Supabase Migrations

on:
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
  workflow_dispatch:

env:
  HAS_SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' }}
  HAS_SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF != '' }}
  HAS_SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD != '' }}

jobs:
  deploy-migrations:
    if: ${{ env.HAS_SUPABASE_ACCESS_TOKEN == 'true' && env.HAS_SUPABASE_PROJECT_REF == 'true' && env.HAS_SUPABASE_DB_PASSWORD == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push --linked --include-all

  missing-secrets-note:
    if: ${{ env.HAS_SUPABASE_ACCESS_TOKEN != 'true' || env.HAS_SUPABASE_PROJECT_REF != 'true' || env.HAS_SUPABASE_DB_PASSWORD != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Explain skipped migration deploy
        run: echo "Supabase migration deploy skipped: set SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_REF, and SUPABASE_DB_PASSWORD."
